<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe Ultra Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: -apple-system, system-ui, sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        
        /* Живая карточка */
        .card { background: white; border-radius: 20px; padding: 20px; color: #000; width: 100%; max-width: 360px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); margin-bottom: 15px; box-sizing: border-box; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .card:active { transform: scale(0.96); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .goal-header { display: flex; justify-content: space-between; align-items: center; }
        .goal-info { flex-grow: 1; padding-right: 15px; }
        .goal-title { font-weight: bold; font-size: 18px; margin: 0; color: #000; }
        .goal-desc { font-size: 13px; color: #777; margin: 5px 0 0 0; line-height: 1.3; }
        .stats-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
        .badge { background: #fff0e0; color: #FF8C00; padding: 4px 10px; border-radius: 10px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        
        /* Кнопка выполнения */
        .btn-complete { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #FF8C00; background: transparent; color: white; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; padding: 0; }
        .btn-complete.done { background: #FF8C00; transform: scale(1.05); }
        
        /* Модальные окна с плавной анимацией */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; animation: fadeIn 0.3s ease; backdrop-filter: blur(3px); }
        .modal-center { align-items: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; color: #000; box-sizing: border-box; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; border-top: 2px solid #000; }
        .modal-content-center { border-radius: 25px; width: 90%; padding: 25px; text-align: center; border: none; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Стилизация форм и кастомных Select */
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s; background: #fafafa; }
        input:focus, textarea:focus, select:focus { border-color: #000; background: #fff; }
        select.custom-select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; color: #000; padding-right: 40px; }
        
        /* Кнопки */
        .btn-add { background: #000; color: white; border: none; padding: 16px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; margin-top: 10px; width: 100%; max-width: 360px; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.97); }
        .btn-save { background: #FF8C00; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #555; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #000; z-index: 100; }
        .header { padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .title-row { display: flex; align-items: center; justify-content: center; }
        .main-title { margin: 0; font-size: 26px; font-weight: bold; }
        .m-logo { height: 32px; border-radius: 8px; margin-left: 10px; }
        .deadline-tag { font-size: 11px; color: #555; font-weight: bold; margin-left: auto; display: flex; align-items: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [userName, setUserName] = useState('Чемпион');
            const [streak, setStreak] = useState(128);
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const [motivationTone, setMotivationTone] = useState('soft');
            const [soundTheme, setSoundTheme] = useState('standard');
            
            const [goals, setGoals] = useState(() => {
                const saved = localStorage.getItem('motivateMe_v6_goals');
                return saved ? JSON.parse(saved) : [];
            });

            // Окна и формы
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingGoalId, setEditingGoalId] = useState(null);
            const [actionMenuGoal, setActionMenuGoal] = useState(null);
            const [confirmDeleteGoalId, setConfirmDeleteGoalId] = useState(null);
            
            const [form, setForm] = useState({
                title: '', description: '', type: 'habit', deadline: '23:59', duration: '', ignoreHoliday: false
            });

            // Реф для долгого нажатия
            const pressTimer = useRef(null);

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                if (tg) {
                    tg.ready(); tg.expand();
                    if (tg.initDataUnsafe?.user) setUserName(tg.initDataUnsafe.user.first_name);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('motivateMe_v6_goals', JSON.stringify(goals));
            }, [goals]);

            const changeDate = (days) => {
                const newDate = new Date(currentDate);
                newDate.setDate(newDate.getDate() + days);
                setCurrentDate(newDate);
                window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light');
            };

            const openCreateModal = () => {
                setForm({ title: '', description: '', type: 'habit', deadline: '23:59', duration: '', ignoreHoliday: false });
                setEditingGoalId(null);
                setIsModalOpen(true);
            };

            const openEditModal = (goal) => {
                setForm(goal);
                setEditingGoalId(goal.id);
                setActionMenuGoal(null);
                setIsModalOpen(true);
            };

            const saveGoal = () => {
                if (!form.title) return;
                
                if (editingGoalId) {
                    setGoals(goals.map(g => g.id === editingGoalId ? { ...form, id: g.id, streak: g.streak, history: g.history, createdAt: g.createdAt } : g));
                } else {
                    const newGoal = { ...form, id: Date.now(), streak: 0, history: {}, createdAt: new Date().toDateString() };
                    setGoals([newGoal, ...goals]);
                }
                
                setIsModalOpen(false);
                window.Telegram?.WebApp?.HapticFeedback.notificationOccurred('success');
            };

            const deleteGoal = () => {
                setGoals(goals.filter(g => g.id !== confirmDeleteGoalId));
                setConfirmDeleteGoalId(null);
                window.Telegram?.WebApp?.HapticFeedback.notificationOccurred('success');
            };

            // Логика ДОЛГОГО НАЖАТИЯ
            const handleTouchStart = (goal) => {
                pressTimer.current = setTimeout(() => {
                    window.Telegram?.WebApp?.HapticFeedback.impactOccurred('heavy');
                    setActionMenuGoal(goal);
                }, 500); // 500 мс для открытия меню
            };

            const handleTouchEnd = () => {
                if (pressTimer.current) clearTimeout(pressTimer.current);
            };

            const toggleGoal = (e, goalObj) => {
                e.stopPropagation(); // ВАЖНО: останавливаем клик, чтобы не сработала анимация карточки
                
                const todayStr = currentDate.toDateString();
                const isCheckingToday = todayStr === new Date().toDateString();
                const isCurrentlyDone = !!goalObj.history[todayStr];

                if (!isCurrentlyDone && isCheckingToday) {
                    const [h, m] = goalObj.deadline.split(':');
                    const limit = new Date(); limit.setHours(parseInt(h, 10), parseInt(m, 10), 0);
                    
                    if (new Date() > limit) {
                        const msg = motivationTone === 'hard' ? "Время вышло! Провал. Соберись!" : "Увы, время вышло. Завтра получится лучше!";
                        window.Telegram?.WebApp?.showAlert(msg);
                        window.Telegram?.WebApp?.HapticFeedback.notificationOccurred('error');
                        return; 
                    }
                }

                setGoals(goals.map(g => {
                    if (g.id !== goalObj.id) return g;
                    const newHistory = { ...g.history };
                    if (!isCurrentlyDone) {
                        newHistory[todayStr] = true;
                        window.Telegram?.WebApp?.HapticFeedback.notificationOccurred('success');
                    } else {
                        delete newHistory[todayStr];
                        window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light');
                    }
                    return { ...g, history: newHistory, streak: isCurrentlyDone ? Math.max(0, g.streak - 1) : g.streak + 1 };
                }));
            };

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <div className="title-row">
                            <h1 className="main-title">MotivateMe</h1>
                            <img src="image_0.png" alt="M logo" className="m-logo" />
                        </div>
                        <p style={{ opacity: 0.8, margin: '5px 0', fontSize: '14px' }}>{userName}, действуй!</p>
                    </div>

                    {activeTab === 'home' && (
                        <React.Fragment>
                            {/* Календарь */}
                            <div className="card" style={{ padding: '15px', borderRadius: '15px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <button onClick={() => changeDate(-1)} style={{ border: 'none', background: 'none', color: '#FF8C00', fontSize: '22px', cursor: 'pointer' }}>◀</button>
                                    <span style={{ fontSize: '16px', fontWeight: 'bold', color: '#000' }}>{currentDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}</span>
                                    <button onClick={() => changeDate(1)} style={{ border: 'none', background: 'none', color: '#FF8C00', fontSize: '22px', cursor: 'pointer' }}>▶</button>
                                </div>
                            </div>

                            {/* Список Целей */}
                            {goals.length === 0 && <p style={{textAlign:'center', marginTop:'20px', color:'white'}}>Список пуст. Добавь свою первую цель!</p>}
                            
                            {goals.map(g => {
                                const isDone = !!g.history[currentDate.toDateString()];
                                return (
                                    <div 
                                        key={g.id} 
                                        className="card" 
                                        onTouchStart={() => handleTouchStart(g)}
                                        onTouchEnd={handleTouchEnd}
                                        onTouchMove={handleTouchEnd}
                                        onMouseDown={() => handleTouchStart(g)}
                                        onMouseUp={handleTouchEnd}
                                        onMouseLeave={handleTouchEnd}
                                        onClick={() => { window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light'); }} // Короткий тап просто дает отклик и анимацию
                                        style={{ borderLeft: g.ignoreHoliday ? '6px solid #FF8C00' : 'none', opacity: isDone ? 0.7 : 1 }}
                                    >
                                        <div className="goal-header">
                                            <div className="goal-info">
                                                <div className="goal-title" style={{ textDecoration: isDone ? 'line-through' : 'none' }}>{g.title}</div>
                                                {g.description && <div className="goal-desc">{g.description}</div>}
                                            </div>
                                            
                                            {/* НОВАЯ КНОПКА ВЫПОЛНЕНИЯ */}
                                            <button 
                                                className={`btn-complete ${isDone ? 'done' : ''}`} 
                                                onClick={(e) => toggleGoal(e, g)}
                                            >
                                                {isDone ? '✓' : ''}
                                            </button>
                                        </div>
                                        
                                        <div className="stats-row">
                                            {g.type !== 'once' && <span className="badge">🔥 {g.streak}</span>}
                                            {g.type === 'habit' && <span className="badge">∞</span>}
                                            {g.type === 'sprint' && <span className="badge">⏳ Ост: {Math.max(0, parseInt(g.duration || 0) - g.streak)} дн.</span>}
                                            <span className="deadline-tag">до {g.deadline}</span>
                                        </div>
                                    </div>
                                );
                            })}

                            <button className="btn-add" onClick={openCreateModal}>+ Добавить цель</button>
                        </React.Fragment>
                    )}

                    {/* Вкладки Прогресс, Лидеры, Настройки (Сохранены без изменений из прошлой версии, только Select обновлен) */}
                    {activeTab === 'settings' && (
                        <div className="card">
                            <h3 style={{ textAlign: 'center', color: '#FF8C00', margin:'0 0 20px 0' }}>Настройки</h3>
                            <label style={{ display: 'block', fontSize: '14px', fontWeight: 'bold', marginBottom: '8px', color: '#000' }}>Тон поддержки:</label>
                            <select className="custom-select" value={motivationTone} onChange={e => setMotivationTone(e.target.value)}>
                                <option value="soft">Мягкий (Поддержка)</option>
                                <option value="hard">Жесткий (Спарта)</option>
                            </select>
                        </div>
                    )}
                    
                    {/* МОДАЛЬНЫЕ ОКНА */}

                    {/* 1. Контекстное меню (Долгое нажатие) */}
                    {actionMenuGoal && (
                        <div className="modal-overlay" onClick={() => setActionMenuGoal(null)}>
                            <div className="modal-content" style={{ paddingBottom: '40px' }} onClick={e => e.stopPropagation()}>
                                <h2 style={{margin:'0 0 5px 0', textAlign: 'center'}}>{actionMenuGoal.title}</h2>
                                <p style={{textAlign: 'center', color: '#777', marginTop: 0, marginBottom: '25px'}}>Выберите действие</p>
                                
                                <button className="btn-save" style={{background: '#000', marginBottom: '10px'}} onClick={() => openEditModal(actionMenuGoal)}>✏️ Редактировать</button>
                                <button className="btn-danger" onClick={() => { setConfirmDeleteGoalId(actionMenuGoal.id); setActionMenuGoal(null); }}>🗑 Удалить цель</button>
                                <button className="btn-cancel" onClick={() => setActionMenuGoal(null)}>Закрыть</button>
                            </div>
                        </div>
                    )}

                    {/* 2. Подтверждение удаления */}
                    {confirmDeleteGoalId && (
                        <div className="modal-overlay modal-center" onClick={() => setConfirmDeleteGoalId(null)}>
                            <div className="modal-content-center" onClick={e => e.stopPropagation()}>
                                <h2>Удалить цель?</h2>
                                <p style={{color: '#777', marginBottom: '25px'}}>Вся история и ударный режим будут стерты. Это действие нельзя отменить.</p>
                                <button className="btn-danger" onClick={deleteGoal}>Да, удалить безвозвратно</button>
                                <button className="btn-cancel" onClick={() => setConfirmDeleteGoalId(null)}>Отмена</button>
                            </div>
                        </div>
                    )}

                    {/* 3. Создание / Редактирование цели */}
                    {isModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsModalOpen(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <h2 style={{margin:'0 0 20px 0', color: '#000'}}>{editingGoalId ? 'Редактировать цель' : 'Новая цель'}</h2>
                                
                                <input placeholder="Название (например: Пробежка)" value={form.title} onChange={e => setForm({...form, title: e.target.value})} style={{color: '#000'}} />
                                <textarea placeholder="Описание (зачем тебе это?)" rows="2" value={form.description} onChange={e => setForm({...form, description: e.target.value})} style={{color: '#000'}} />
                                
                                <div style={{fontSize:'13px', marginBottom:'8px', fontWeight:'bold', color: '#000'}}>Тип цели:</div>
                                <select className="custom-select" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                    <option value="once">Разовая (один раз)</option>
                                    <option value="habit">Постоянная (∞)</option>
                                    <option value="sprint">Спринт (на N дней)</option>
                                </select>

                                {form.type === 'sprint' && (
                                    <input type="number" placeholder="Сколько дней соблюдать?" value={form.duration} onChange={e => setForm({...form, duration: e.target.value})} style={{color: '#000'}} />
                                )}

                                <div style={{display:'flex', gap:'15px'}}>
                                    <div style={{flex:1}}>
                                        <div style={{fontSize:'13px', marginBottom:'8px', fontWeight:'bold', color: '#333'}}>Дедлайн:</div>
                                        <input type="time" value={form.deadline} onChange={e => setForm({...form, deadline: e.target.value})} style={{color: '#000'}} />
                                    </div>
                                    <div style={{flex:1, display:'flex', alignItems:'center'}}>
                                        <label style={{fontSize:'13px', display:'flex', alignItems:'center', gap:'8px', marginTop:'10px', fontWeight: 'bold', color: '#000', cursor: 'pointer'}}>
                                            <input type="checkbox" checked={form.ignoreHoliday} onChange={e => setForm({...form, ignoreHoliday: e.target.checked})} style={{width:'auto', margin:0, transform: 'scale(1.2)'}} /> 
                                            Без выходных
                                        </label>
                                    </div>
                                </div>

                                <button className="btn-save" onClick={saveGoal}>{editingGoalId ? 'СОХРАНИТЬ ИЗМЕНЕНИЯ' : 'СОЗДАТЬ ЦЕЛЬ'}</button>
                                <button className="btn-cancel" onClick={() => setIsModalOpen(false)}>ОТМЕНА</button>
                            </div>
                        </div>
                    )}

                    {/* Нижнее меню */}
                    <div className="tab-bar">
                        <div onClick={() => setActiveTab('home')} style={{ color: activeTab === 'home' ? '#FF8C00' : '#ccc', textAlign: 'center', cursor: 'pointer' }}>
                            <div style={{ fontSize: '24px' }}>🎯</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ГЛАВНАЯ</div>
                        </div>
                        <div onClick={() => setActiveTab('progress')} style={{ color: activeTab === 'progress' ? '#FF8C00' : '#ccc', textAlign: 'center', cursor: 'pointer' }}>
                            <div style={{ fontSize: '24px' }}>📊</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>АНАЛИЗ</div>
                        </div>
                        <div onClick={() => setActiveTab('settings')} style={{ color: activeTab === 'settings' ? '#FF8C00' : '#ccc', textAlign: 'center', cursor: 'pointer' }}>
                            <div style={{ fontSize: '24px' }}>⚙️</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ОПЦИИ</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
