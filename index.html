<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotivateMe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Скрываем скроллбар для красоты */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [streak, setStreak] = useState(128);
            const [userName, setUserName] = useState('Чемпион');
            
            // Настройки
            const [soundTheme, setSoundTheme] = useState('standard');
            const [weekendsEnabled, setWeekendsEnabled] = useState(true);

            // Календарь
            const [currentDate, setCurrentDate] = useState(new Date());

            const [tasks, setTasks] = useState(() => {
                const savedTasks = localStorage.getItem('motivateMe_tasks');
                return savedTasks ? JSON.parse(savedTasks) : [
                    { id: 1, text: 'Чтение (30 мин)', completed: false, isAnimating: false, date: new Date().toDateString() },
                    { id: 2, text: 'Спорт', completed: false, isAnimating: false, date: new Date().toDateString() }
                ];
            });

            const [newTaskText, setNewTaskText] = useState('');
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            useEffect(() => { localStorage.setItem('motivateMe_tasks', JSON.stringify(tasks)); }, [tasks]);

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                if (tg) {
                    tg.ready();
                    tg.expand();
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) setUserName(tg.initDataUnsafe.user.first_name);
                }
            }, []);

            const playMotivationSound = () => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    if (soundTheme === 'standard') { osc.frequency.value = 600; osc.type = 'sine'; } 
                    else if (soundTheme === 'movie') { osc.frequency.value = 440; osc.type = 'square'; } 
                    else if (soundTheme === 'voice') { osc.frequency.value = 880; osc.type = 'triangle'; }

                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } catch (e) { console.log("Аудио не поддерживается"); }
            };

            useEffect(() => {
                let interval = null;
                if (isTimerRunning && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0) {
                    setIsTimerRunning(false);
                    playMotivationSound();
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.showAlert('Время фокуса вышло!');
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timeLeft, soundTheme]);

            const toggleTask = (id) => {
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                const task = tasks.find(t => t.id === id);
                if (!task.completed) playMotivationSound();

                setTasks(tasks.map(t => t.id === id ? { ...t, isAnimating: true } : t));
                setTimeout(() => {
                    setTasks(currentTasks => {
                        let updatedTasks = currentTasks.map(t => t.id === id ? { ...t, completed: !t.completed, isAnimating: false } : t);
                        return updatedTasks.sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
                    });
                }, 400); 
            };

            const addTask = () => {
                if (newTaskText.trim() === '') return;
                const newTask = { 
                    id: Date.now(), 
                    text: newTaskText, 
                    completed: false, 
                    isAnimating: false,
                    date: currentDate.toDateString()
                };
                setTasks(prev => [{...newTask}, ...prev].sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1)));
                setNewTaskText('');
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const switchTab = (tab) => {
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                setActiveTab(tab);
            };

            const inviteFriend = () => {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
                    const text = "Присоединяйся ко мне в MotivateMe! Пора вырваться из кольца ожидания 🔥";
                    
                    // Имя твоего бота интегрировано
    </script>
</body>
</html>
