<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe Ultra Pro Max</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: -apple-system, system-ui, sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        
        /* Живая карточка с новым Flex-лайаутом */
        .card { background: white; border-radius: 20px; padding: 20px; color: #000; width: 100%; max-width: 360px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); margin-bottom: 15px; box-sizing: border-box; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; user-select: none; -webkit-user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 10px; }
        .card:active { transform: scale(0.96); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .goal-content-wrapper { flex: 1; display: flex; flex-direction: column; }
        .goal-title { font-weight: bold; font-size: 18px; margin: 0; color: #000; line-height: 1.2; }
        .goal-desc { font-size: 13px; color: #777; margin: 5px 0 0 0; line-height: 1.3; }
        .stats-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
        .badge { background: #fff0e0; color: #FF8C00; padding: 4px 10px; border-radius: 10px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        
        /* Огромная кнопка выполнения, отцентрованная по высоте */
        .btn-complete { width: 68px; height: 68px; border-radius: 50%; border: 4px solid #FF8C00; background: transparent; color: white; font-size: 36px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; padding: 0; cursor: pointer; position: relative; margin-left: auto; }
        .btn-complete:active { transform: scale(0.92); }
        .btn-complete.done { background: #FF8C00; transform: scale(1.05); border-color: #FF8C00; box-shadow: 0 0 15px rgba(255,140,0,0.5); }
        
        /* Модальные окна */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; animation: fadeIn 0.3s ease; backdrop-filter: blur(3px); }
        .modal-center { align-items: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; color: #000; box-sizing: border-box; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; border-top: 2px solid #000; }
        .modal-content-center { border-radius: 25px; width: 90%; max-width: 320px; padding: 25px; text-align: center; border: none; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); background: white; color: #000; }
        
        /* Стилизация форм */
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.2s; background: #fafafa; color: #000; }
        input:focus, textarea:focus, select:focus { border-color: #000; background: #fff; }
        select.custom-select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; }
        
        /* Кнопки */
        .btn-add { background: #000; color: white; border: none; padding: 16px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; margin-top: 10px; width: 100%; max-width: 360px; transition: transform 0.1s; display: block; }
        .btn-add:active { transform: scale(0.97); }
        .btn-save { background: #FF8C00; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #555; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #000; z-index: 100; }
        .header { padding: 20px 20px 10px 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .title-row { display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .main-title { margin: 0; font-size: 26px; font-weight: bold; color: white; }
        .m-logo { height: 32px; border-radius: 8px; margin-left: 12px; display: block; }
        .deadline-tag { font-size: 11px; color: #ef5350; font-weight: bold; margin-left: auto; display: flex; align-items: center; border: 1px solid #ef5350; padding: 1px 4px; border-radius: 4px; }
    </style>
</head>
