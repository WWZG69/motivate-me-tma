<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: -apple-system, system-ui, sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .card { background: white; border-radius: 20px; padding: 20px; color: #333; width: 100%; max-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); box-sizing: border-box; margin-bottom: 20px; animation: fadeIn 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [streak, setStreak] = useState(128);
            const [userName, setUserName] = useState('Чемпион');
            const [currentDate, setCurrentDate] = useState(new Date());
            
            // Настройки
            const [soundTheme, setSoundTheme] = useState('standard');
            const [weekendsEnabled, setWeekendsEnabled] = useState(true);

            // Состояния задач и таймера
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('motivateMe_v10_tasks');
                return saved ? JSON.parse(saved) : [
                    { id: 1, text: 'Чтение (30 мин)', completed: false, date: new Date().toDateString() },
                    { id: 2, text: 'Спорт', completed: false, date: new Date().toDateString() }
                ];
            });
            const [newTaskText, setNewTaskText] = useState('');
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                if (tg) {
                    tg.ready();
                    tg.expand();
                    if (tg.initDataUnsafe?.user) setUserName(tg.initDataUnsafe.user.first_name);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('motivateMe_v10_tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                let interval = null;
                if (isTimerRunning && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0) {
                    setIsTimerRunning(false);
                    if (window.Telegram?.WebApp) {
                        window.Telegram.WebApp.showAlert('Время фокуса вышло!');
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timeLeft]);

            const addTask = () => {
                if (!newTaskText.trim()) return;
                const newTask = { id: Date.now(), text: newTaskText, completed: false, date: currentDate.toDateString() };
                setTasks([newTask, ...tasks]);
                setNewTaskText('');
                window.Telegram?.WebApp?.HapticFeedback.impactOccurred('medium');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
                window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light');
            };

            const changeDate = (days) => {
                const newDate = new Date(currentDate);
                newDate.setDate(newDate.getDate() + days);
                setCurrentDate(newDate);
                window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light');
            };

            const inviteFriend = () => {
                const text = encodeURIComponent("Присоединяйся ко мне в MotivateMe! 🔥");
                const url = `https://t.me/MotivateMe_ibot`;
                window.Telegram?.WebApp?.openTelegramLink(`https://t.me/share/url?url=${url}&text=${text}`);
            };

            const showMotivation = () => {
                const quotes = ["Ты сильнее, чем ты думаешь! 💪", "Дисциплина — это свобода. ✨", "Гордимся твоим прогрессом! ❤️"];
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                window.Telegram?.WebApp?.showAlert(q);
            };

            const visibleTasks = tasks.filter(t => t.date === currentDate.toDateString());

            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minHeight: '100vh', paddingBottom: '80px', boxSizing: 'border-box' }}>
                    <div style={{ padding: '20px', textAlign: 'center' }}>
                        <h1 style={{ margin: 0, fontSize: '26px' }}>MotivateMe</h1>
                        <p style={{ opacity: 0.8, margin: '5px 0' }}>Привет, {userName}!</p>
                    </div>

                    {activeTab === 'home' && (
                        <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '0 20px', boxSizing: 'border-box' }}>
                            <div style={{ background: 'rgba(255,255,255,0.2)', borderRadius: '25px', padding: '20px', width: '100%', maxWidth: '300px', textAlign: 'center', marginBottom: '20px' }}>
                                <div style={{ fontSize: '40px' }}>🔥</div>
                                <div style={{ fontSize: '40px', fontWeight: 'bold' }}>{streak}</div>
                                <div style={{ fontSize: '14px', marginBottom: '10px' }}>дней подряд!</div>
                                <button onClick={showMotivation} style={{ background: 'transparent', border: '1px solid white', color: 'white', borderRadius: '10px', padding: '5px 15px', fontSize: '12px' }}>💌 Поддержка</button>
                            </div>

                            <div className="card" style={{ textAlign: 'center' }}>
                                <h3 style={{ margin: '0 0 10px 0', color: '#FF8C00' }}>Таймер Фокуса</h3>
                                <div style={{ fontSize: '42px', fontWeight: 'bold', marginBottom: '10px' }}>
                                    {Math.floor(timeLeft / 60).toString().padStart(2, '0')}:{(timeLeft % 60).toString().padStart(2, '0')}
                                </div>
                                <button onClick={() => setIsTimerRunning(!isTimerRunning)} style={{ width: '100%', background: '#FF8C00', border: 'none', color: 'white', padding: '12px', borderRadius: '12px', fontWeight: 'bold' }}>
                                    {isTimerRunning ? 'ПАУЗА' : 'СТАРТ'}
                                </button>
                            </div>

                            <div className="card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px', alignItems: 'center' }}>
                                    <button onClick={() => changeDate(-1)} style={{ border: 'none', background: 'none', color: '#FF8C00', fontSize: '20px' }}>◀</button>
                                    <span style={{ fontSize: '13px', fontWeight: 'bold' }}>{currentDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })}</span>
                                    <button onClick={() => changeDate(1)} style={{ border: 'none', background: 'none', color: '#FF8C00', fontSize: '20px' }}>▶</button>
                                </div>
                                <div style={{ display: 'flex', marginBottom: '15px' }}>
                                    <input type="text" value={newTaskText} onChange={e => setNewTaskText(e.target.value)} placeholder="Цель..." style={{ flexGrow: 1, padding: '10px', border: '1px solid #ddd', borderRadius: '10px 0 0 10px', outline: 'none' }} />
                                    <button onClick={addTask} style={{ background: '#FF8C00', color: 'white', border: 'none', padding: '0 15px', borderRadius: '0 10px 10px 0' }}>+</button>
                                </div>
                                {visibleTasks.map(t => (
                                    <div key={t.id} onClick={() => toggleTask(t.id)} style={{ display: 'flex', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid #eee', opacity: t.completed ? 0.5 : 1 }}>
                                        <div style={{ width: '18px', height: '18px', border: '2px solid #FF8C00', borderRadius: '5px', marginRight: '10px', background: t.completed ? '#FF8C00' : 'none' }}></div>
                                        <span style={{ textDecoration: t.completed ? 'line-through' : 'none' }}>{t.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'social' && (
                        <div className="card" style={{ marginTop: '20px' }}>
                            <h3 style={{ textAlign: 'center', color: '#FF8C00' }}>Лидеры</h3>
                            <div style={{ padding: '10px 0', borderBottom: '1px solid #eee', display: 'flex', justifyContent: 'space-between' }}>
                                <span>1. Алексей М.</span>
                                <strong>150 🔥</strong>
                            </div>
                            <div style={{ padding: '10px 0', borderBottom: '1px solid #eee', display: 'flex', justifyContent: 'space-between', background: '#fff4e5' }}>
                                <span>2. {userName} (Вы)</span>
                                <strong>{streak} 🔥</strong>
                            </div>
                            <button onClick={inviteFriend} style={{ width: '100%', marginTop: '20px', background: 'none', border: '1px dashed #FF8C00', color: '#FF8C00', padding: '10px', borderRadius: '10px', fontWeight: 'bold' }}>+ Позвать друга</button>
                        </div>
                    )}

                    <div style={{ position: 'fixed', bottom: 0, width: '100%', background: 'white', display: 'flex', justifyContent: 'space-around', padding: '15px 0', borderTop: '1px solid #eee' }}>
                        <div onClick={() => setActiveTab('home')} style={{ color: activeTab === 'home' ? '#FF8C00' : '#ccc', textAlign: 'center' }}>
                            <div style={{ fontSize: '20px' }}>✓</div><div style={{ fontSize: '10px' }}>ЗАДАЧИ</div>
                        </div>
                        <div onClick={() => setActiveTab('social')} style={{ color: activeTab === 'social' ? '#FF8C00' : '#ccc', textAlign: 'center' }}>
                            <div style={{ fontSize: '20px' }}>🏆</div><div style={{ fontSize: '10px' }}>ЛИДЕРЫ</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
