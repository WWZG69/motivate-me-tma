<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white; overflow: hidden; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader">Загрузка MotivateMe...</div>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [userName, setUserName] = useState('Чемпион');
            const [activeTab, setActiveTab] = useState('home');

            useEffect(() => {
                // Прячем загрузчик, когда React готов
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';

                const tg = window.Telegram.WebApp;
                if (tg) {
                    tg.ready();
                    tg.expand();
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        setUserName(tg.initDataUnsafe.user.first_name);
                    }
                }
            }, []);

            const switchTab = (tab) => {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
                setActiveTab(tab);
            };

            const cardStyle = {
                background: 'white',
                borderRadius: '20px',
                padding: '20px',
                color: '#333',
                width: '85%',
                maxWidth: '300px',
                boxShadow: '0 10px 20px rgba(0,0,0,0.1)',
                textAlign: 'center',
                marginTop: '20px'
            };

            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minHeight: '100vh', paddingTop: '20px' }}>
                    <h1 style={{ margin: 0, fontSize: '26px' }}>MotivateMe</h1>
                    <p style={{ opacity: 0.8, margin: '5px 0 20px 0' }}>Привет, {userName}!</p>

                    <div style={{ background: 'rgba(255,255,255,0.2)', borderRadius: '25px', padding: '20px', width: '80%', maxWidth: '280px', textAlign: 'center' }}>
                        <div style={{ fontSize: '40px' }}>🔥</div>
                        <div style={{ fontSize: '36px', fontWeight: 'bold' }}>128</div>
                        <div style={{ fontSize: '14px' }}>дней подряд!</div>
                    </div>

                    <div style={cardStyle}>
                        <h3 style={{ color: '#FF8C00', margin: '0 0 10px 0' }}>Твой план</h3>
                        <p style={{ fontSize: '14px', color: '#666' }}>На сегодня задач нет.<br/>Добавь новую цель!</p>
                    </div>

                    {/* Навигация */}
                    <div style={{ position: 'fixed', bottom: 0, width: '100%', background: 'white', display: 'flex', justifyContent: 'space-around', padding: '15px 0' }}>
                        <div onClick={() => switchTab('home')} style={{ color: activeTab === 'home' ? '#FF8C00' : '#ccc', textAlign: 'center', cursor: 'pointer' }}>
                            <div style={{ fontSize: '20px' }}>✓</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ЗАДАЧИ</div>
                        </div>
                        <div onClick={() => switchTab('social')} style={{ color: activeTab === 'social' ? '#FF8C00' : '#ccc', textAlign: 'center', cursor: 'pointer' }}>
                            <div style={{ fontSize: '20px' }}>🏆</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ЛИДЕРЫ</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
