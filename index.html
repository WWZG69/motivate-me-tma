<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #FF8C00; font-family: -apple-system, system-ui, sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .container { padding: 20px; display: flex; flexDirection: column; alignItems: center; paddingBottom: 100px; }
        .card { background: white; border-radius: 20px; padding: 18px; color: #333; width: 100%; max-width: 360px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); margin-bottom: 12px; position: relative; animation: fadeIn 0.3s; }
        .goal-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .goal-title { font-weight: bold; font-size: 18px; margin: 0; }
        .goal-desc { font-size: 13px; color: #777; margin: 5px 0 10px 0; }
        .stats-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .badge { background: #fff0e0; color: #FF8C00; padding: 4px 10px; border-radius: 10px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        
        /* Modal Style */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; color: #333; box-sizing: border-box; animation: slideUp 0.3s; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: white; color: #FF8C00; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; margin-top: 10px; }
        .btn-save { background: #FF8C00; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [goals, setGoals] = useState(() => {
                const saved = localStorage.getItem('motivateMe_v3_goals');
                return saved ? JSON.parse(saved) : [];
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());

            // Состояние новой цели
            const [form, setForm] = useState({
                title: '', description: '', type: 'habit', deadline: '09:00', duration: '', ignoreHoliday: false
            });

            useEffect(() => {
                localStorage.setItem('motivateMe_v3_goals', JSON.stringify(goals));
            }, [goals]);

            const saveGoal = () => {
                if (!form.title) return;
                const goal = {
                    ...form,
                    id: Date.now(),
                    streak: 0,
                    history: {},
                    createdAt: new Date().toDateString()
                };
                setGoals([goal, ...goals]);
                setIsModalOpen(false);
                setForm({ title: '', description: '', type: 'habit', deadline: '09:00', duration: '', ignoreHoliday: false });
                window.Telegram?.WebApp?.HapticFeedback.notificationOccurred('success');
            };

            const toggleGoal = (id) => {
                const todayStr = currentDate.toDateString();
                setGoals(goals.map(g => {
                    if (g.id !== id) return g;
                    const newHistory = { ...g.history };
                    const isDone = !!newHistory[todayStr];
                    
                    if (!isDone) {
                        newHistory[todayStr] = true;
                        window.Telegram?.WebApp?.HapticFeedback.impactOccurred('medium');
                    } else {
                        delete newHistory[todayStr];
                        window.Telegram?.WebApp?.HapticFeedback.impactOccurred('light');
                    }
                    return { ...g, history: newHistory, streak: isDone ? Math.max(0, g.streak - 1) : g.streak + 1 };
                }));
            };

            return (
                <div className="container">
                    <h1 style={{ textAlign: 'center', marginBottom: '5px' }}>Цели</h1>
                    <p style={{ textAlign: 'center', opacity: 0.8, marginBottom: '25px' }}>Твой путь к величию</p>

                    {activeTab === 'home' && (
                        <>
                            {goals.length === 0 && <p style={{textAlign:'center', marginTop:'50px'}}>Список пуст. Время ставить цели!</p>}
                            
                            {goals.map(g => {
                                const isDone = !!g.history[currentDate.toDateString()];
                                return (
                                    <div key={g.id} className="card" onClick={() => toggleGoal(g.id)} style={{ borderLeft: g.ignoreHoliday ? '6px solid #FF8C00' : 'none', opacity: isDone ? 0.6 : 1 }}>
                                        <div className="goal-header">
                                            <div className="goal-title">{g.title}</div>
                                            {isDone && <span style={{color:'green', fontSize:'20px'}}>✓</span>}
                                        </div>
                                        {g.description && <div className="goal-desc">{g.description}</div>}
                                        
                                        <div className="stats-row">
                                            {g.type !== 'once' && <span className="badge">🔥 {g.streak}</span>}
                                            
                                            {g.type === 'habit' && <span className="badge">∞</span>}
                                            
                                            {g.type === 'sprint' && (
                                                <span className="badge">⏳ {g.duration - g.streak} дн.</span>
                                            )}
                                            
                                            <span style={{fontSize:'11px', color:'#999', marginLeft:'auto'}}>до {g.deadline}</span>
                                        </div>
                                    </div>
                                );
                            })}

                            <button className="btn-add" onClick={() => setIsModalOpen(true)}>+ Добавить цель</button>
                        </>
                    )}

                    {/* Модальное окно создания */}
                    {isModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsModalOpen(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <h2 style={{margin:'0 0 20px 0'}}>Новая цель</h2>
                                
                                <input placeholder="Заголовок (например: Бег)" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                <textarea placeholder="Описание (зачем это тебе?)" rows="2" value={form.description} onChange={e => setForm({...form, description: e.target.value})} />
                                
                                <div style={{fontSize:'12px', marginBottom:'5px', fontWeight:'bold'}}>Тип цели:</div>
                                <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                    <option value="once">Разовая задача</option>
                                    <option value="habit">Постоянная (Бесконечно)</option>
                                    <option value="sprint">Срочная (На количество дней)</option>
                                </select>

                                {form.type === 'sprint' && (
                                    <input type="number" placeholder="Сколько дней нужно соблюдать?" value={form.duration} onChange={e => setForm({...form, duration: e.target.value})} />
                                )}

                                <div style={{display:'flex', gap:'15px'}}>
                                    <div style={{flex:1}}>
                                        <div style={{fontSize:'12px', marginBottom:'5px', fontWeight:'bold'}}>Дедлайн:</div>
                                        <input type="time" value={form.deadline} onChange={e => setForm({...form, deadline: e.target.value})} />
                                    </div>
                                    <div style={{flex:1, display:'flex', alignItems:'center'}}>
                                        <label style={{fontSize:'12px', display:'flex', alignItems:'center', gap:'8px', marginTop:'10px'}}>
                                            <input type="checkbox" checked={form.ignoreHoliday} onChange={e => setForm({...form, ignoreHoliday: e.target.checked})} style={{width:'auto', margin:0}} /> 
                                            Без выходных
                                        </label>
                                    </div>
                                </div>

                                <button className="btn-save" onClick={saveGoal}>СОЗДАТЬ ЦЕЛЬ</button>
                            </div>
                        </div>
                    )}

                    {/* Нижнее меню */}
                    <div className="tab-bar">
                        <div onClick={() => setActiveTab('home')} style={{ color: activeTab === 'home' ? '#FF8C00' : '#ccc', textAlign: 'center' }}>
                            <div style={{ fontSize: '24px' }}>🎯</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ГЛАВНАЯ</div>
                        </div>
                        <div onClick={() => setActiveTab('progress')} style={{ color: activeTab === 'progress' ? '#FF8C00' : '#ccc', textAlign: 'center' }}>
                            <div style={{ fontSize: '24px' }}>📊</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>АНАЛИЗ</div>
                        </div>
                        <div onClick={() => setActiveTab('settings')} style={{ color: activeTab === 'settings' ? '#FF8C00' : '#ccc', textAlign: 'center' }}>
                            <div style={{ fontSize: '24px' }}>⚙️</div>
                            <div style={{ fontSize: '10px', fontWeight: 'bold' }}>ОПЦИИ</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
