<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotivateMe</title>
    
    <link rel="stylesheet" href="style.css?v=20">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = '<div style="color:#ff3b30; padding:110px 20px 20px 20px; box-sizing:border-box; font-family:monospace; word-wrap:break-word; background:#141414; min-height:100vh; z-index:99999; position:relative;">' +
                '<h3 style="color:#ff8c00; margin-top:0;">СИСТЕМНЫЙ СБОЙ:</h3>' +
                '<p style="font-size: 14px;"><b>Ошибка:</b> ' + message + '</p>' +
                '<p style="font-size: 12px; opacity:0.8;"><b>Файл:</b> ' + source + '</p>' +
                '<p style="font-size: 12px; opacity:0.8;"><b>Строка:</b> ' + lineno + '</p>' +
                '</div>';
            return true;
        };
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="utils.js?v=20"></script>
    <script type="text/babel" src="icons.jsx?v=20"></script>
    <script type="text/babel" src="components.jsx?v=20"></script>
    <script type="text/babel" src="app.jsx?v=20"></script>
</body>
</html>
